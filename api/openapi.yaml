# OpenAPI Specification for Codex2API

openapi: 3.0.3
info:
  title: Codex2API
  description: |
    OpenAI-compatible API proxy for Codex with enhanced features including:
    - Multi-account pooling with automatic rotation
    - Intelligent request routing and load balancing
    - Real-time usage tracking and monitoring
    - Administrative management interface
    - Request/response translation between OpenAI and Codex formats
    - Streaming and non-streaming chat completions
    - Images generations/edits with JSON, multipart edits, and SSE streaming
    - Responses WebSocket transport for Codex CLI compatibility
    - Explicit-only Version header passthrough
    - Responses builtin tool alias normalization
    - Function calling support
    - Tool calling support
  version: 1.0.0
  contact:
    name: API Support
    url: https://github.com/codex2api
    email: support@codex2api.local
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://example.com/v1
    description: Versioned placeholder base URL
  - url: http://example.com
    description: Root-path placeholder base URL

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Enter your API key with Bearer prefix.
        Example: "Bearer <API_KEY>"

  parameters:
    CodexVersionHeader:
      name: Version
      in: header
      required: false
      schema:
        type: string
        example: "<CODEX_CLI_VERSION>"
      description: |
        Optional Codex CLI Version header. Codex2API does not synthesize this
        header by default; it is forwarded upstream only when explicitly sent by
        the downstream client.
    OpenAIBetaHeader:
      name: OpenAI-Beta
      in: header
      required: false
      schema:
        type: string
        example: "responses_websockets=2026-02-06"
      description: |
        Optional beta capability header. Responses WebSocket requests add the
        required responses_websockets flag unless the client already sends one.

  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - type
          properties:
            code:
              type: string
              description: Machine-readable error code
              enum:
                - invalid_request
                - invalid_api_key
                - missing_api_key
                - insufficient_scope
                - invalid_parameter
                - missing_field
                - invalid_field_type
                - invalid_field_format
                - context_length_exceeded
                - unsupported_model
                - rate_limit_reached
                - server_error
                - service_unavailable
                - upstream_error
                - upstream_timeout
                - resource_not_found
                - resource_conflict
            message:
              type: string
              description: Human-readable error message
            type:
              type: string
              description: Error category
              enum:
                - invalid_request_error
                - authentication_error
                - permission_error
                - not_found_error
                - rate_limit_error
                - server_error
                - upstream_error
            details:
              description: Additional error context
              oneOf:
                - type: object
                  additionalProperties: true
                - type: array
                  items:
                    type: object
                    additionalProperties: true

    Model:
      type: object
      required:
        - id
        - object
        - created
        - owned_by
      properties:
        id:
          type: string
          description: Model identifier
          example: "gpt-5.4"
        object:
          type: string
          enum: [model]
        created:
          type: integer
          description: Unix timestamp
        owned_by:
          type: string
          example: "openai"

    ModelList:
      type: object
      required:
        - object
        - data
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: '#/components/schemas/Model'

    ChatCompletionRequest:
      type: object
      required:
        - model
        - messages
      properties:
        model:
          type: string
          description: ID of the model to use
          example: "gpt-5.4"
        messages:
          type: array
          description: Messages comprising the conversation
          items:
            type: object
            required:
              - role
              - content
            properties:
              role:
                type: string
                enum: [system, user, assistant, tool]
              content:
                type: string
              name:
                type: string
              tool_calls:
                type: array
              tool_call_id:
                type: string
          minItems: 1
          maxItems: 4096
        max_tokens:
          type: integer
          description: Maximum number of tokens to generate
          minimum: 1
          maximum: 65536
        temperature:
          type: number
          description: Sampling temperature
          minimum: 0
          maximum: 2
          default: 1
        top_p:
          type: number
          description: Nucleus sampling parameter
          minimum: 0
          maximum: 1
          default: 1
        n:
          type: integer
          description: Number of completions to generate
          minimum: 1
          maximum: 1
          default: 1
        stream:
          type: boolean
          description: Whether to stream back partial progress
          default: false
        stop:
          type: string
          description: Stop sequence
          maxLength: 256
        presence_penalty:
          type: number
          minimum: -2
          maximum: 2
          default: 0
        frequency_penalty:
          type: number
          minimum: -2
          maximum: 2
          default: 0
        user:
          type: string
          description: Unique identifier for the end-user
          maxLength: 256
        reasoning_effort:
          type: string
          enum: [low, medium, high, xhigh]
          description: Level of reasoning effort
        service_tier:
          type: string
          enum: [auto, default, fast]
          default: auto

    ChatCompletionResponse:
      type: object
      required:
        - id
        - object
        - created
        - model
        - choices
      properties:
        id:
          type: string
          example: "chatcmpl-abc123"
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          description: Unix timestamp
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                    enum: [assistant]
                  content:
                    type: string
                  reasoning_content:
                    type: string
                  tool_calls:
                    type: array
              finish_reason:
                type: string
                enum: [stop, length, tool_calls, content_filter, null]
              logprobs:
                type: object
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
            prompt_tokens_details:
              type: object
              properties:
                cached_tokens:
                  type: integer
            completion_tokens_details:
              type: object
              properties:
                reasoning_tokens:
                  type: integer
        system_fingerprint:
          type: string

    ChatCompletionStreamResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion.chunk]
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              delta:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
                  reasoning_content:
                    type: string
                  tool_calls:
                    type: array
              finish_reason:
                type: string
                enum: [stop, length, tool_calls, content_filter, null]

    ResponsesRequest:
      type: object
      required:
        - model
        - input
      properties:
        model:
          type: string
          description: ID of the model to use
        input:
          description: Input items or a plain string. Plain strings are wrapped as a user message.
          oneOf:
            - type: string
            - type: array
              items:
                type: object
        instructions:
          type: string
        max_output_tokens:
          type: integer
          minimum: 1
          maximum: 65536
        temperature:
          type: number
          minimum: 0
          maximum: 2
        top_p:
          type: number
          minimum: 0
          maximum: 1
        stream:
          type: boolean
        stop:
          type: string
        user:
          type: string
        reasoning:
          type: object
          properties:
            effort:
              type: string
              enum: [low, medium, high, xhigh]
        service_tier:
          type: string
          enum: [auto, default, fast]
        store:
          type: boolean
        truncation:
          type: string
          enum: [auto, disabled]
        previous_response_id:
          type: string
        tools:
          type: array
          description: |
            Responses tools. Built-in tool aliases are normalized before
            upstream forwarding; for example web_search_preview and
            web_search_preview_2025_03_11 become web_search.
          items:
            type: object
            additionalProperties: true
        tool_choice:
          description: Tool choice string or object. Built-in tool aliases under type/tools are normalized.
          oneOf:
            - type: string
            - type: object
              additionalProperties: true

    ResponsesWebsocketMessage:
      type: object
      description: |
        Text frame accepted by GET /responses WebSocket. The frame may be a
        response.create envelope or a plain Responses request.
      additionalProperties: true
      example:
        type: response.create
        model: gpt-5.4
        input: Hello from WebSocket
        stream: true

    ResponsesResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          enum: [response]
        created_at:
          type: integer
        status:
          type: string
          enum: [in_progress, completed, failed, cancelled, incomplete]
        error:
          $ref: '#/components/schemas/Error'
        model:
          type: string
        output:
          type: array
        usage:
          type: object
          properties:
            input_tokens:
              type: integer
            output_tokens:
              type: integer
            total_tokens:
              type: integer
        incomplete_details:
          type: object

    ImagesGenerationRequest:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          description: Text prompt used to generate images
        model:
          type: string
          description: Image model ID
          default: gpt-image-2
          example: gpt-image-2
        response_format:
          type: string
          description: Output payload format
          enum: [b64_json, url]
          default: b64_json
        size:
          type: string
          description: Requested output size
          example: 1024x1024
        quality:
          type: string
          description: Requested output quality
        background:
          type: string
          description: Background style
        output_format:
          type: string
          description: Image output format (e.g. png/jpeg/webp)
        output_compression:
          type: integer
          description: Compression level for supported output formats
        moderation:
          type: string
          description: Moderation mode
        partial_images:
          type: integer
          description: Number of partial image events requested for streaming responses
        stream:
          type: boolean
          description: Return text/event-stream events when true
          default: false
        n:
          type: integer
          description: Ignored for compatibility and not forwarded upstream

    ImagesEditsRequest:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          description: Text prompt describing the desired edit result
        model:
          type: string
          description: Image model ID
          default: gpt-image-2
          example: gpt-image-2
        image:
          description: Base image input (single URL, data URL, raw base64 string, object, or array form)
          oneOf:
            - type: string
            - type: array
              items:
                oneOf:
                  - type: string
                  - type: object
                    properties:
                      image_url:
                        type: string
        images:
          type: array
          description: Additional image inputs (JSON mode)
          items:
            oneOf:
              - type: string
              - type: object
                properties:
                  image_url:
                    type: string
                  url:
                    type: string
        mask:
          description: Optional mask image URL/data URL/raw base64 or object. mask.file_id is not supported.
          oneOf:
            - type: string
            - type: object
              properties:
                image_url:
                  type: string
                url:
                  type: string
        response_format:
          type: string
          description: Output payload format
          enum: [b64_json, url]
          default: b64_json
        size:
          type: string
          description: Requested output size
          example: 1024x1024
        quality:
          type: string
          description: Requested output quality
        background:
          type: string
          description: Background style
        output_format:
          type: string
          description: Image output format (e.g. png/jpeg/webp)
        output_compression:
          type: integer
          description: Compression level for supported output formats
        input_fidelity:
          type: string
          description: Input fidelity mode forwarded to the image edit tool
          enum: [low, high]
        moderation:
          type: string
          description: Moderation mode
        partial_images:
          type: integer
          description: Number of partial image events requested for streaming responses
        stream:
          type: boolean
          description: Return text/event-stream events when true
          default: false
        n:
          type: integer
          description: Ignored for compatibility and not forwarded upstream

    ImagesEditsMultipartRequest:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          description: Text prompt describing the desired edit result
        model:
          type: string
          default: gpt-image-2
        image:
          type: string
          format: binary
          description: Input image file. Clients may also send repeated image[] parts.
        image[]:
          type: array
          description: Repeated input image files
          items:
            type: string
            format: binary
        mask:
          type: string
          format: binary
          description: Optional mask image file
        response_format:
          type: string
          enum: [b64_json, url]
          default: b64_json
        size:
          type: string
        quality:
          type: string
        background:
          type: string
        output_format:
          type: string
        output_compression:
          type: integer
        input_fidelity:
          type: string
          enum: [low, high]
        moderation:
          type: string
        partial_images:
          type: integer
        stream:
          type: boolean
          default: false

    ImageData:
      type: object
      properties:
        b64_json:
          type: string
          description: Base64-encoded image data (without data URL prefix)
        url:
          type: string
          description: Image URL (or data URL when URL mode is requested)
        revised_prompt:
          type: string
          description: Prompt rewritten by the model, if provided upstream

    ImagesResponse:
      type: object
      required:
        - created
        - data
      properties:
        created:
          type: integer
          description: Unix timestamp
        data:
          type: array
          items:
            $ref: '#/components/schemas/ImageData'

    ImageStreamEvent:
      type: object
      properties:
        type:
          type: string
          enum:
            - image_generation.partial_image
            - image_generation.completed
            - image_edit.partial_image
            - image_edit.completed
        partial_image_index:
          type: integer
          description: Present on partial image events
        b64_json:
          type: string
          description: Base64-encoded image data when response_format is b64_json
        url:
          type: string
          description: Data URL when response_format is url
        usage:
          type: object
          additionalProperties: true

paths:
  /models:
    get:
      summary: List available models
      description: Returns a list of available models that can be used with the API
      operationId: listModels
      tags:
        - Models
      responses:
        '200':
          description: List of models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelList'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /chat/completions:
    post:
      summary: Create chat completion
      description: |
        Creates a chat completion for the provided messages.
        Compatible with OpenAI Chat Completions API.
      operationId: createChatCompletion
      tags:
        - Chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ChatCompletionStreamResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          headers:
            Retry-After:
              description: Seconds to wait before retrying
              schema:
                type: integer
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /responses:
    get:
      summary: Connect Responses WebSocket
      description: |
        Codex CLI compatible Responses WebSocket transport. Clients connect with
        WebSocket upgrade and send JSON text frames using either response.create
        or a plain Responses API request. Upstream SSE events are forwarded back
        to the client as WebSocket text frames.
      operationId: connectResponsesWebsocket
      tags:
        - Responses
      parameters:
        - $ref: '#/components/parameters/CodexVersionHeader'
        - $ref: '#/components/parameters/OpenAIBetaHeader'
      responses:
        '101':
          description: WebSocket upgrade accepted
        '400':
          description: Invalid WebSocket request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create response
      description: |
        Creates a response using the native Codex Responses API.
        Provides direct access to Codex functionality.
        Built-in tool aliases are normalized before forwarding.
        The Version header is forwarded only when the client explicitly sends it.
      operationId: createResponse
      tags:
        - Responses
      parameters:
        - $ref: '#/components/parameters/CodexVersionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponsesRequest'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesResponse'
            text/event-stream:
              schema:
                type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /backend-api/codex/responses:
    servers:
      - url: http://example.com
        description: Root-path placeholder base URL for Codex CLI direct compatibility
    get:
      summary: Connect Codex direct Responses WebSocket
      description: |
        Direct Codex CLI compatibility alias for GET /v1/responses. Uses
        WebSocket upgrade and forwards Responses events as text frames.
      operationId: connectBackendCodexResponsesWebsocket
      tags:
        - Responses
      parameters:
        - $ref: '#/components/parameters/CodexVersionHeader'
        - $ref: '#/components/parameters/OpenAIBetaHeader'
      responses:
        '101':
          description: WebSocket upgrade accepted
        '400':
          description: Invalid WebSocket request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create response through Codex direct route
      description: Direct Codex CLI compatibility alias for POST /v1/responses.
      operationId: createBackendCodexResponse
      tags:
        - Responses
      parameters:
        - $ref: '#/components/parameters/CodexVersionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponsesRequest'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesResponse'
            text/event-stream:
              schema:
                type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /responses/compact:
    post:
      summary: Create compact response
      description: |
        Handles context compaction requests by forwarding to the Codex upstream
        `/responses/compact` endpoint and returning the non-streaming compact
        response. Requests with `stream:true` are rejected with `400`.
        Also available as `/backend-api/codex/responses/compact` for Codex CLI
        direct base URL compatibility.
      operationId: createResponseCompact
      tags:
        - Responses
      parameters:
        - $ref: '#/components/parameters/CodexVersionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponsesRequest'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesResponse'
            text/event-stream:
              schema:
                type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /images/generations:
    post:
      summary: Generate images
      description: |
        OpenAI-compatible images generation endpoint.
        Default model is `gpt-image-2`.
        When stream is true, returns SSE events such as
        image_generation.partial_image and image_generation.completed.
      operationId: createImageGeneration
      tags:
        - Images
      parameters:
        - $ref: '#/components/parameters/CodexVersionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImagesGenerationRequest'
      responses:
        '200':
          description: Images response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagesResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ImageStreamEvent'
        '400':
          description: Invalid request or unsupported model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /images/edits:
    post:
      summary: Edit images
      description: |
        OpenAI-compatible images edit endpoint.
        Supports JSON requests and multipart/form-data with image, image[],
        mask, and input_fidelity fields. When stream is true, returns SSE
        events such as image_edit.partial_image and image_edit.completed.
      operationId: createImageEdit
      tags:
        - Images
      parameters:
        - $ref: '#/components/parameters/CodexVersionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
